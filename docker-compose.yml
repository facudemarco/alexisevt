services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Usando Base de Datos local SQLite para rápido desarrollo y mockups
      DATABASE_URL: sqlite:////app/local_dev.db
      SECRET_KEY: ${JWT_SECRET:-MdpuF8KsXiRArNlHtl6pXO2XyLSJMTQ8_Alexis}
    volumes:
      - ./backend:/app
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  db_data:
