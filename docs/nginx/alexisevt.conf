# /etc/nginx/sites-available/alexisevt
#
# Instalación:
#   ln -s /etc/nginx/sites-available/alexisevt /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d alexis.iwebtecnology.com

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name alexis.iwebtecnology.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alexis.iwebtecnology.com;

    # SSL — certbot lo completa automáticamente con:
    #   certbot --nginx -d alexis.iwebtecnology.com
    # ssl_certificate     /etc/letsencrypt/live/alexis.iwebtecnology.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/alexis.iwebtecnology.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options              "SAMEORIGIN"                             always;
    add_header X-Content-Type-Options       "nosniff"                                always;
    add_header X-XSS-Protection             "1; mode=block"                          always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"        always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains"    always;
    # CSP — mitigación XSS mientras se implementa httpOnly cookies (ADR-003 C3)
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://alexis.iwebtecnology.com; media-src 'self'; font-src 'self' data:; connect-src 'self' https://alexis.iwebtecnology.com;" always;

    # ─── Imágenes (nginx sirve directo, sin tocar Python) ─────────────────────
    location /media/images/ {
        alias /home/iweb/alexisevt/data/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Solo extensiones de imagen permitidas
        location ~* \.(jpg|jpeg|png|webp|gif|svg)$ {
            # permitido — nginx hereda el alias y headers del bloque padre
        }
        # Bloquear cualquier otra cosa bajo /media/images/
        location ~ {
            return 403;
        }
    }

    # ─── API (path ofuscado → FastAPI interno en /api/v1/) ────────────────────
    location /MdpuF8KsXiRArNIHtI6pXO2XyLSJMTQ8_Alexis/api/ {
        rewrite ^/MdpuF8KsXiRArNIHtI6pXO2XyLSJMTQ8_Alexis/api/(.*)$ /api/v1/$1 break;
        proxy_pass          http://127.0.0.1:8011;

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Permitir subida de imágenes hasta 15 MB (el backend valida 10 MB)
        client_max_body_size 1000M;

        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # No cachear respuestas del API
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ─── Assets estáticos Next.js (caché agresivo — hash en filename) ─────────
    location /_next/static/ {
        proxy_pass  http://127.0.0.1:3011/_next/static/;
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ─── Frontend Next.js (todo lo demás) ────────────────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:3011;

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # WebSocket / SSE support
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";

        proxy_read_timeout  60s;
    }

    # ─── Bloquear acceso directo a /api/ (FastAPI interno, no exponer) ─────────
    location /api/ {
        return 404;
    }

    # ─── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/alexisevt.access.log;
    error_log  /var/log/nginx/alexisevt.error.log warn;
}
